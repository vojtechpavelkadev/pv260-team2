name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  WORKING_DIRECTORY: ArkTracker
  CLI_CSPROJ: ArkTracker/ArkTracker.Cli/ArkTracker.Cli.csproj
  API_CSPROJ: ArkTracker/ArkTracker.Api/ArkTracker.Api.csproj
  CLI_BINARY_NAME: ArkTracker.Cli.exe

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Verify Code Formatting
        run: dotnet format ${{ env.WORKING_DIRECTORY }} --verify-no-changes

  build-and-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ${{ env.WORKING_DIRECTORY }}/ArkTracker.sln

      - name: Build
        run: dotnet build ${{ env.WORKING_DIRECTORY }}/ArkTracker.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.WORKING_DIRECTORY }}/ArkTracker.sln --configuration Release --no-build --verbosity normal

  publish-and-release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish CLI
        run: dotnet publish ${{ env.CLI_CSPROJ }} -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o ./publish/cli

      - name: Publish API
        run: dotnet publish ${{ env.API_CSPROJ }} -c Release -o ./publish/api

      - name: Zip API
        run: |
          cd ./publish/api
          zip -r ../../Arktracker-Api.zip .
          cd ../..

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            ./publish/cli/${{ env.CLI_BINARY_NAME }}
            Arktracker-Api.zip
          retention-days: 14

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "ArkTracker ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ./publish/cli/${{ env.CLI_BINARY_NAME }}
            Arktracker-Api.zip
          draft: false
          prerelease: false